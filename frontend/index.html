    <!-- //script should be below all html code  -->
    <script>
        //getting data from backend to the frontend
        async function GetTODOs(){
            const response = await axios.get("http://localhost:3000/notes",{
                headers :{
                    "token" : localStorage.getItem("token")
                }
            });
            const notes = response.data.notes;

            document.getElementById("notes").innerHTML= "";
            // appending the notes one by one 
            
            for (let i = 0; i < notes.length; i++) {
                const element = notes[i]  ;
                const newDiv = document.createElement("div") 
                newDiv.setAttribute("class","note")
                newDiv.setAttribute("style","border :2px solid black ;border-radius: 10px ; padding: 20px;margin :20px ;display:flex ;justify-content: space-between;")
                
                const deletehtml = `<button class="delete button" onclick ="DeleteTodo('${element._id}')"> Delete </button>`
                newDiv.innerHTML= `<div> ${element.note}</div> `+ deletehtml ; 

                document.getElementById("notes").appendChild(newDiv);
            }                  
        }
        GetTODOs();

        async function addNote(){
            const inputText = document.getElementById("inp").value
            
            const response = await axios.post("http://localhost:3000/notes",{
                note: inputText
            },{
                headers : {
                    "token" : localStorage.getItem("token")
                }
            });

            // create new div
            const newDiv = document.createElement("div") 
            newDiv.setAttribute("class","note")
           
            console.log(response)
            console.log(response.data)
            console.log(response.data._id)
            const deletehtml = `<button class="delete button" onclick ="DeleteTodo('${response.data._id}')"> Delete </button>`

            newDiv.innerHTML= `<div>${inputText}</div>` + deletehtml
            document.getElementById("notes").appendChild(newDiv);

            //empty the input box
            document.getElementById("inp").value =""
        }
        async function DeleteTodo(todoId){
            console.log(todoId);
            const response = await axios.delete(`http://localhost:3000/notes/${todoId}`,{
                headers :{
                    "token" : localStorage.getItem("token")
                }
            })
            console.log(response.data) 
            
            await GetTODOs()
        }
    </script>
